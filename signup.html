<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up · Insight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #10162B;
    --paper: #F7F7F5;
    --card: #FFFFFF;
    --accent: #E8A33D;
    --accent-soft: #FCEFD9;
    --line: #E4E4E1;
    --muted: #6E7280;
    --danger: #D14343;
    --danger-soft: #FBEAEA;
    --success: #2E9B5D;
    --success-soft: #EAF6EE;
    --radius-field: 12px;
    --radius-pill: 999px;
    --font-display: 'Space Grotesk', 'Hind Siliguri', 'Noto Sans Bengali', sans-serif;
    --font-body: 'Inter', 'Hind Siliguri', 'Noto Sans Bengali', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- পেছনের অ্যাটমোস্ফিয়ার (সিগনেচার রিং মোটিফ) ---------- */
  .atmosphere {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .atmosphere-ring {
    position: absolute;
    top: -180px;
    left: -180px;
    width: 620px;
    height: 620px;
    stroke: var(--ink);
    stroke-width: 1.5;
    fill: none;
    opacity: 0.055;
    animation: slow-spin 150s linear infinite reverse;
  }
  .atmosphere-ring .tick { stroke: var(--ink); }
  .atmosphere-ring .core { stroke: var(--accent); opacity: 1; }
  @keyframes slow-spin { to { transform: rotate(360deg); } }
  @media (max-width: 640px) {
    .atmosphere-ring { width: 420px; height: 420px; top: -120px; left: -120px; }
  }

  /* ---------- টপবার ---------- */
  .topbar {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
  }
  .help-link, .lang-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    padding: 8px 10px;
    border-radius: var(--radius-pill);
    transition: background-color .15s ease;
  }
  .help-link:hover, .lang-pill:hover { background: rgba(16,22,43,0.05); }
  .lang-pill { border: 1.5px solid var(--line); padding: 8px 16px 8px 12px; }
  .icon-circle {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--ink);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* ---------- মূল লেআউট ---------- */
  .auth-shell {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    padding-top: 8px;
    padding-bottom: 40px;
  }
  .auth-card {
    width: 100%;
    max-width: 460px;
    background: var(--card);
    border-radius: 28px;
    padding: 40px 36px;
    box-shadow: 0 1px 2px rgba(16,22,43,0.04), 0 24px 48px -24px rgba(16,22,43,0.18);
    animation: rise-in .5s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes rise-in {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .logo span {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 21px;
    letter-spacing: -0.01em;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 27px;
    letter-spacing: -0.01em;
    text-align: center;
    margin: 0 0 6px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 14.5px;
    margin: 0 0 28px;
  }

  .banner {
    font-size: 13.5px;
    padding: 11px 14px;
    border-radius: var(--radius-field);
    margin-bottom: 18px;
    line-height: 1.4;
  }
  .banner-error { background: var(--danger-soft); color: var(--danger); }
  .banner-success { background: var(--success-soft); color: var(--success); }

  form { display: flex; flex-direction: column; gap: 16px; }
  .field-row { display: flex; gap: 12px; }
  .field-row .field { flex: 1; min-width: 0; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }
  .optional-tag {
    font-weight: 400;
    color: var(--muted);
    font-size: 12px;
  }
  input, select {
    width: 100%;
    height: 49px;
    padding: 0 15px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-field);
    font: 500 15px/1.4 var(--font-body);
    color: var(--ink);
    background: #FFF;
    transition: border-color .15s ease, box-shadow .15s ease;
    appearance: none;
    -webkit-appearance: none;
  }
  select {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236E7280' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 16px;
    padding-right: 40px;
  }
  select:invalid { color: #ADB0B8; }
  input::placeholder { color: #ADB0B8; font-weight: 400; }
  input:focus, select:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 4px rgba(232,163,61,0.16);
  }
  .field-error {
    font-size: 12.5px;
    color: var(--danger);
    min-height: 1px;
  }
  .field-status {
    font-size: 12.5px;
    min-height: 1px;
  }
  .field-status.is-checking { color: var(--muted); }
  .field-status.is-available { color: var(--success); }
  .field-status.is-taken { color: var(--danger); }

  .input-with-action { position: relative; display: flex; align-items: center; }
  .input-with-action input { padding-right: 46px; }
  .toggle-visibility {
    position: absolute;
    right: 6px;
    width: 36px; height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--muted);
    border-radius: 50%;
  }
  .toggle-visibility:hover { background: rgba(16,22,43,0.06); }
  .toggle-visibility .eye-off { display: none; }
  .toggle-visibility.is-visible .eye-on { display: none; }
  .toggle-visibility.is-visible .eye-off { display: block; }

  .btn-primary {
    height: 52px;
    border-radius: var(--radius-pill);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--ink);
    color: #FFF;
    border: none;
    transition: transform .12s ease, opacity .15s ease;
    margin-top: 4px;
  }
  .btn-primary:hover:not(:disabled) { opacity: .92; }
  .btn-primary:active:not(:disabled) { transform: scale(.98); }
  .btn-primary:disabled { opacity: .65; cursor: default; }

  .spinner {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #FFF;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-line {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    margin-top: 22px;
  }
  .footer-line a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: none;
  }
  .footer-line a:hover { text-decoration: underline; }

  :is(button, a, input, select):focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  @media (max-width: 480px) {
    .auth-card { padding: 32px 22px; border-radius: 22px; }
    .topbar { padding: 16px 16px; }
    .field-row { flex-direction: column; gap: 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .atmosphere-ring { animation: none; }
    .auth-card { animation: none; }
    * { transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

  <div class="atmosphere" aria-hidden="true">
    <svg class="atmosphere-ring" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <circle cx="300" cy="300" r="260"/>
      <circle cx="300" cy="300" r="180"/>
      <g class="tick">
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(0 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(22.5 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(45 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(67.5 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(90 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(112.5 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(135 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(157.5 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(180 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(202.5 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(225 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(247.5 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(270 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(292.5 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(315 300 300)"/>
        <line x1="300" y1="100" x2="300" y2="118" transform="rotate(337.5 300 300)"/>
      </g>
      <circle class="core" cx="300" cy="300" r="60"/>
    </svg>
  </div>

  <header class="topbar">
    <button type="button" class="help-link" id="helpBtn">
      <span class="icon-circle">?</span>
      <span>Help</span>
    </button>
    <button type="button" class="lang-pill" id="langBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 3.8 5.7 3.8 9s-1.3 6.4-3.8 9c-2.5-2.6-3.8-5.7-3.8-9S9.5 5.6 12 3z"/></svg>
      <span>English</span>
    </button>
  </header>

  <main class="auth-shell">
    <div class="auth-card">
      <div class="logo">
        <svg width="26" height="26" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="90" stroke="#10162B" stroke-width="10"/>
          <circle cx="100" cy="100" r="56" stroke="#10162B" stroke-width="10"/>
          <circle cx="100" cy="100" r="20" fill="#E8A33D"/>
        </svg>
        <span>Insight</span>
      </div>

      <h1>Create your account</h1>
      <p class="subtitle">Join SocialFeed and start sharing</p>

      <div class="banner" id="formBanner" hidden></div>

      <form id="signupForm" novalidate>
        <div class="field-row">
          <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" autocomplete="given-name" placeholder="First name">
            <span class="field-error" id="firstNameError"></span>
          </div>
          <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" autocomplete="family-name" placeholder="Last name">
            <span class="field-error" id="lastNameError"></span>
          </div>
        </div>

        <div class="field">
          <label for="middleName">Middle Name <span class="optional-tag">(optional)</span></label>
          <input type="text" id="middleName" autocomplete="additional-name" placeholder="Middle name">
        </div>

        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" autocomplete="username" placeholder="Choose a unique username">
          <span class="field-status" id="usernameStatus"></span>
          <span class="field-error" id="usernameError"></span>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" autocomplete="bday">
            <span class="field-error" id="dobError"></span>
          </div>
          <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" required>
              <option value="" disabled selected>Select</option>
              <option value="female">Female</option>
              <option value="male">Male</option>
              <option value="other">Other</option>
              <option value="prefer_not_to_say">Prefer not to say</option>
            </select>
            <span class="field-error" id="genderError"></span>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-with-action">
            <input type="password" id="password" autocomplete="new-password" placeholder="Create a password">
            <button type="button" class="toggle-visibility" id="togglePassword" aria-label="Show password">
              <svg class="eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-11-7-11-7a21.6 21.6 0 015.06-6.06M9.9 4.24A10.4 10.4 0 0112 4c7 0 11 7 11 7a21.6 21.6 0 01-2.94 3.94M14.12 14.12a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <button type="submit" class="btn-primary" id="signupSubmitBtn">
          <span class="btn-label">Sign Up</span>
          <span class="spinner" hidden></span>
        </button>
      </form>

      <p class="footer-line">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </main>

<script type="module">
  import { auth, db } from "./config.js";
  import {
    createUserWithEmailAndPassword,
    deleteUser,
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import {
    ref,
    get,
    set,
    runTransaction,
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

  // ---------- ইউজারনেম নিয়ম: অক্ষর দিয়ে শুরু, ৩-২০ ক্যারেক্টার, letter/number/_/. ----------
  const USERNAME_REGEX = /^[a-zA-Z][a-zA-Z0-9_.]{2,19}$/;

  function normalizeUsername(value) {
    return value.trim().toLowerCase();
  }

  // ---------- এলিমেন্ট রেফারেন্স ----------
  const form = document.getElementById("signupForm");
  const banner = document.getElementById("formBanner");
  const submitBtn = document.getElementById("signupSubmitBtn");
  const btnLabel = submitBtn.querySelector(".btn-label");
  const spinner = submitBtn.querySelector(".spinner");
  const togglePasswordBtn = document.getElementById("togglePassword");

  const fields = {
    firstName: document.getElementById("firstName"),
    middleName: document.getElementById("middleName"),
    lastName: document.getElementById("lastName"),
    username: document.getElementById("username"),
    email: document.getElementById("email"),
    dob: document.getElementById("dob"),
    gender: document.getElementById("gender"),
    password: document.getElementById("password"),
  };

  const errors = {
    firstName: document.getElementById("firstNameError"),
    lastName: document.getElementById("lastNameError"),
    username: document.getElementById("usernameError"),
    email: document.getElementById("emailError"),
    dob: document.getElementById("dobError"),
    gender: document.getElementById("genderError"),
    password: document.getElementById("passwordError"),
  };

  const usernameStatus = document.getElementById("usernameStatus");

  // ভবিষ্যতে আজকের চেয়ে বেশি তারিখ যাতে সিলেক্ট করা না যায়
  fields.dob.max = new Date().toISOString().split("T")[0];

  // ---------- পাসওয়ার্ড শো/হাইড টগল ----------
  togglePasswordBtn.addEventListener("click", () => {
    const willShow = fields.password.type === "password";
    fields.password.type = willShow ? "text" : "password";
    togglePasswordBtn.classList.toggle("is-visible", willShow);
    togglePasswordBtn.setAttribute("aria-label", willShow ? "Hide password" : "Show password");
  });

  // ---------- রিয়েল-টাইম ইউজারনেম availability চেক ----------
  let usernameIsAvailable = false;
  let usernameCheckToken = 0;
  let debounceTimer;

  fields.username.addEventListener("input", () => {
    usernameIsAvailable = false;
    errors.username.textContent = "";
    const raw = fields.username.value.trim();

    clearTimeout(debounceTimer);

    if (!raw) {
      usernameStatus.textContent = "";
      usernameStatus.className = "field-status";
      return;
    }

    if (!USERNAME_REGEX.test(raw)) {
      usernameStatus.textContent = "";
      usernameStatus.className = "field-status";
      errors.username.textContent = "3–20 characters, start with a letter. Letters, numbers, _ or . only.";
      return;
    }

    usernameStatus.textContent = "Checking availability…";
    usernameStatus.className = "field-status is-checking";

    const myToken = ++usernameCheckToken;
    debounceTimer = setTimeout(async () => {
      try {
        const usernameLower = normalizeUsername(raw);
        const snapshot = await get(ref(db, "usernames/" + usernameLower));
        if (myToken !== usernameCheckToken) return; // ইউজার এর মধ্যে আরও টাইপ করেছে, পুরনো রেজাল্ট বাতিল

        if (snapshot.exists()) {
          usernameIsAvailable = false;
          usernameStatus.textContent = "✕ This username is taken";
          usernameStatus.className = "field-status is-taken";
        } else {
          usernameIsAvailable = true;
          usernameStatus.textContent = "✓ Username is available";
          usernameStatus.className = "field-status is-available";
        }
      } catch (err) {
        if (myToken !== usernameCheckToken) return;
        usernameStatus.textContent = "";
        usernameStatus.className = "field-status";
        // এখানে ব্যর্থ হলেও সাবমিটের সময় আবার যাচাই হবে বলে চুপচাপ থাকা যায়
      }
    }, 450);
  });

  function clearAllErrors() {
    Object.values(errors).forEach((el) => (el.textContent = ""));
    banner.hidden = true;
    banner.textContent = "";
    banner.className = "banner";
  }

  function showBanner(message, type = "error") {
    banner.textContent = message;
    banner.className = `banner banner-${type}`;
    banner.hidden = false;
  }

  function setLoading(isLoading) {
    submitBtn.disabled = isLoading;
    btnLabel.textContent = isLoading ? "Creating account..." : "Sign Up";
    spinner.hidden = !isLoading;
  }

  function calculateAge(dobString) {
    const dob = new Date(dobString);
    const today = new Date();
    let age = today.getFullYear() - dob.getFullYear();
    const monthDiff = today.getMonth() - dob.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) age--;
    return age;
  }

  function validateForm() {
    let isValid = true;

    const firstName = fields.firstName.value.trim();
    const lastName = fields.lastName.value.trim();
    const username = fields.username.value.trim();
    const email = fields.email.value.trim();
    const dob = fields.dob.value;
    const gender = fields.gender.value;
    const password = fields.password.value;

    if (!firstName) { errors.firstName.textContent = "First name is required."; isValid = false; }
    if (!lastName) { errors.lastName.textContent = "Last name is required."; isValid = false; }

    if (!username) {
      errors.username.textContent = "Username is required.";
      isValid = false;
    } else if (!USERNAME_REGEX.test(username)) {
      errors.username.textContent = "3–20 characters, start with a letter. Letters, numbers, _ or . only.";
      isValid = false;
    } else if (!usernameIsAvailable) {
      errors.username.textContent = "Please wait for the username check, or choose an available one.";
      isValid = false;
    }

    if (!email) { errors.email.textContent = "Email is required."; isValid = false; }

    if (!dob) {
      errors.dob.textContent = "Date of birth is required.";
      isValid = false;
    } else if (calculateAge(dob) < 13) {
      errors.dob.textContent = "You must be at least 13 years old to join.";
      isValid = false;
    }

    if (!gender) { errors.gender.textContent = "Please select a gender."; isValid = false; }

    if (!password) {
      errors.password.textContent = "Password is required.";
      isValid = false;
    } else if (password.length < 6) {
      errors.password.textContent = "Password must be at least 6 characters.";
      isValid = false;
    }

    return isValid;
  }

  function mapSignupError(error) {
    switch (error.code) {
      case "auth/email-already-in-use":
        return { field: "email", message: "This email is already registered." };
      case "auth/invalid-email":
        return { field: "email", message: "Please enter a valid email address." };
      case "auth/weak-password":
        return { field: "password", message: "Please choose a stronger password (at least 6 characters)." };
      case "auth/network-request-failed":
        return { field: "banner", message: "Network error. Please check your connection and try again." };
      default:
        return { field: "banner", message: "Something went wrong. Please try again." };
    }
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearAllErrors();

    if (!validateForm()) return;

    const firstName = fields.firstName.value.trim();
    const middleName = fields.middleName.value.trim();
    const lastName = fields.lastName.value.trim();
    const username = fields.username.value.trim();
    const usernameLower = normalizeUsername(username);
    const email = fields.email.value.trim();
    const dob = fields.dob.value;
    const gender = fields.gender.value;
    const password = fields.password.value;

    setLoading(true);

    let createdUser = null;
    let usernameClaimed = false;

    try {
      // ধাপ ১: Firebase Auth এ একাউন্ট তৈরি
      const credential = await createUserWithEmailAndPassword(auth, email, password);
      createdUser = credential.user;

      // ধাপ ২: ইউজারনেম ট্রানজেকশনের মাধ্যমে atomically claim করা
      // (দুইজন একসাথে একই ইউজারনেম নিতে চাইলেও রেস কন্ডিশন এড়ানোর জন্য)
      const usernameRef = ref(db, "usernames/" + usernameLower);
      const txResult = await runTransaction(usernameRef, (currentValue) => {
        if (currentValue === null) return createdUser.uid;
        return; // undefined রিটার্ন করলে ট্রানজেকশন abort হয়ে যাবে, বিদ্যমান ভ্যালু অক্ষত থাকবে
      });

      if (!txResult.committed) {
        await deleteUser(createdUser);
        errors.username.textContent = "This username was just taken. Please choose another.";
        usernameIsAvailable = false;
        usernameStatus.textContent = "";
        usernameStatus.className = "field-status";
        setLoading(false);
        return;
      }

      usernameClaimed = true;

      // ধাপ ৩: users/{uid} এ প্রোফাইল ডেটা লেখা — প্রতিটা ফিল্ড আলাদা, ভবিষ্যতে
      // firstName/lastName সহ যেকোনো ফিল্ড দিয়ে আলাদাভাবে ফিল্টার/এক্সপোর্ট করা যাবে
      const now = Date.now();
      await set(ref(db, "users/" + createdUser.uid), {
        firstName,
        middleName: middleName || "",
        lastName,
        username,
        usernameLower,
        email,
        dob,
        gender,
        createdAt: now,
        updatedAt: now,
        profile: {
          photoURL: "",
          coverURL: "",
          bio: "",
        },
        stats: {
          postsCount: 0,
          followersCount: 0,
          followingCount: 0,
        },
      });

      window.location.href = "home.html";
    } catch (error) {
      // যতদূর পর্যন্ত এগিয়েছিলাম, সেই অনুযায়ী ক্লিনআপ/রোলব্যাক করার চেষ্টা
      if (usernameClaimed) {
        try { await set(ref(db, "usernames/" + usernameLower), null); } catch (_) {}
      }
      if (createdUser) {
        try { await deleteUser(createdUser); } catch (_) {}
      }

      const { field, message } = mapSignupError(error);
      if (errors[field]) errors[field].textContent = message;
      else showBanner(message, "error");
      setLoading(false);
    }
  });
</script>
</body>
</html>

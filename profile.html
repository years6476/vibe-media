<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Insight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary:      #8A4FF7;
      --bg:           #ffffff;
      --surface:      #f7f7f7;
      --border:       #f0f0f0;
      --text:         #1a1a1a;
      --text-2:       #555;
      --text-muted:   #aaa;
      --topbar-h:     46px;
      --pad:          15px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hidden { display: none !important; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════
       TOP BAR — 46px, no border
    ══════════════════════════════════════ */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: #fff;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-inner {
      width: 100%; max-width: 420px;
      padding: 0 12px;
      display: flex; align-items: center;
      justify-content: space-between;
    }

    .icon-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; border-radius: 50%;
      cursor: pointer; color: var(--text);
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:hover { background: var(--surface); }

    .topbar-right { display: flex; align-items: center; gap: 2px; }

    /* 3-dot dropdown */
    .more-wrap { position: relative; }

    .dropdown {
      position: absolute; right: 0; top: calc(100% + 4px);
      background: #fff; border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      min-width: 155px; padding: 6px; z-index: 300;
      animation: fadeDown .15s ease;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dropdown-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px;
      border: none; background: none; cursor: pointer;
      border-radius: 10px;
      font-size: 14px; font-family: 'Poppins', sans-serif;
      font-weight: 500; color: #e63950;
      transition: background .15s; white-space: nowrap;
    }
    .dropdown-item:hover { background: #fff5f5; }

    /* ══════════════════════════════════════
       MAIN
    ══════════════════════════════════════ */
    .main {
      padding-top: var(--topbar-h);
      display: flex; flex-direction: column; align-items: center;
    }

    .page-body {
      width: 100%; max-width: 420px;
      padding: 0 var(--pad);
    }

    /* ══════════════════════════════════════
       COVER PHOTO
       10px border-radius, extends to edges
    ══════════════════════════════════════ */
    .cover-wrap {
      margin: 0 calc(-1 * var(--pad));
      position: relative;
    }

    .cover-photo {
      width: 100%;
      height: 145px;
      border-radius: 10px;
      background: #d9d9d9;
      overflow: hidden;
    }

    .cover-photo img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* ══════════════════════════════════════
       PROFILE SECTION
       Pic overlaps cover by 50% (50px)
       Info stacked below pic — left aligned
    ══════════════════════════════════════ */
    .profile-section {
      margin-top: -50px;   /* pull up = 50% of 100px pic */
      padding: 0 4px 20px;
      position: relative;
      z-index: 10;
    }

    /* ── Profile Pic ── */
    .profile-pic {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #ffffff;
      background: #e0e0e0;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 10px;
    }

    .profile-pic img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    .default-avatar { color: #b8b8b8; }

    /* ── Info block (left-aligned, below pic) ── */
    .profile-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .profile-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 2px;
    }

    .profile-username {
      font-size: 13.5px;
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .profile-bio {
      font-size: 11.5px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-2);
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .profile-address {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 400; color: var(--text-muted);
    }
    .profile-address svg { flex-shrink: 0; }

    /* ── Action Buttons ── */
    .profile-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-edit,
    .btn-share {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 30.5px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      border: 1.5px solid #e0e0e0;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-edit  { width: 171.5px; }
    .btn-share { width: 154.5px; }

    .btn-edit:hover,
    .btn-share:hover {
      background: var(--surface);
      border-color: #ccc;
    }
  </style>
</head>
<body>

  <!-- ══ App ══ -->
  <div id="app">

    <!-- Top Navbar -->
    <header class="topbar">
      <div class="topbar-inner">

        <button class="icon-btn" id="backBtn" aria-label="Go back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>

        <div class="topbar-right">
          <button class="icon-btn" aria-label="Notifications"
                  onclick="window.location.href='/notifications'">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </button>

          <div class="more-wrap">
            <button class="icon-btn" id="moreBtn" aria-label="More options">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="5"  cy="12" r="1.6"/>
                <circle cx="12" cy="12" r="1.6"/>
                <circle cx="19" cy="12" r="1.6"/>
              </svg>
            </button>

            <div class="dropdown hidden" id="dropdown">
              <button class="dropdown-item" id="logoutBtn">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Log Out
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>


    <!-- Main -->
    <main class="main">
      <div class="page-body">

        <!-- Cover Photo (grey default, 10px radius) -->
        <div class="cover-wrap">
          <div class="cover-photo" id="coverPhoto"></div>
        </div>

        <!-- Profile section (overlaps cover by 50%) -->
        <div class="profile-section">

          <!-- Profile Pic -->
          <div class="profile-pic" id="profilePic">
            <svg class="default-avatar" width="52" height="52"
                 viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.67 0 8 1.34 8 4v2H4v-2c0-2.66
                       5.33-4 8-4zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
            </svg>
          </div>

          <!-- Info -->
          <div class="profile-info">
            <h1 class="profile-name"     id="profileName"></h1>
            <p  class="profile-username"  id="profileUsername"></p>
            <p  class="profile-bio"       id="profileBio"></p>
            <div class="profile-address hidden" id="profileAddress">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              <span id="addressText"></span>
            </div>

            <!-- Action Buttons -->
            <div class="profile-actions">

              <button class="btn-edit" onclick="window.location.href='/edit-profile'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Edit Profile
              </button>

              <button class="btn-share" id="shareBtn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="18" cy="5"  r="3"/>
                  <circle cx="6"  cy="12" r="3"/>
                  <circle cx="18" cy="19" r="3"/>
                  <line x1="8.59"  y1="13.51" x2="15.42" y2="17.49"/>
                  <line x1="15.41" y1="6.51"  x2="8.59"  y2="10.49"/>
                </svg>
                Share Profile
              </button>

            </div>
          </div>

        </div>

      </div>
    </main>

  </div>


  <!-- ══ Firebase ══ -->
  <script type="module">
    import { auth, db } from "./config.js";
    import {
      onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import {
      ref, onValue
    } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-database.js";

    const $ = (id) => document.getElementById(id);

    const app             = $("app");
    const backBtn         = $("backBtn");
    const moreBtn         = $("moreBtn");
    const dropdown        = $("dropdown");
    const logoutBtn       = $("logoutBtn");
    const coverPhoto      = $("coverPhoto");
    const profilePic      = $("profilePic");
    const profileName     = $("profileName");
    const profileUsername = $("profileUsername");
    const profileBio      = $("profileBio");
    const profileAddress  = $("profileAddress");
    const addressText     = $("addressText");

    // ── Back ────────────────────────────────────────────────
    backBtn.addEventListener("click", () => {
      if (history.length > 1) history.back();
      else window.location.href = "/";
    });

    // ── Dropdown ────────────────────────────────────────────
    moreBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdown.classList.toggle("hidden");
    });
    document.addEventListener("click", () => dropdown.classList.add("hidden"));
    dropdown.addEventListener("click", (e) => e.stopPropagation());

    // ── Logout ───────────────────────────────────────────────
    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "/login";
    });

    // ── Share Profile ────────────────────────────────────────
    document.getElementById("shareBtn").addEventListener("click", async () => {
      const url = window.location.href;
      if (navigator.share) {
        await navigator.share({ title: "Insight Profile", url });
      } else {
        await navigator.clipboard.writeText(url);
        const btn = document.getElementById("shareBtn");
        const orig = btn.innerHTML;
        btn.textContent = "Copied!";
        setTimeout(() => { btn.innerHTML = orig; }, 2000);
      }
    });

    // ── Auth check ───────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "/login"; return; }
      loadProfile(user);
    });

    // ── Load profile ─────────────────────────────────────────
    function loadProfile(user) {
      onValue(ref(db, `users/${user.uid}`), (snap) => {
        const d = snap.val() || {};

        // Cover
        if (d.coverPhotoUrl) {
          coverPhoto.innerHTML =
            `<img src="${esc(d.coverPhotoUrl)}" alt="Cover">`;
        }

        // Profile pic
        const photoUrl = d.profilePhotoUrl || d.photoURL || user.photoURL || "";
        if (photoUrl) {
          profilePic.innerHTML =
            `<img src="${esc(photoUrl)}" alt="Profile">`;
        }

        // ── Name — multiple field fallbacks ──────────────────
        const name =
          d.name        ||
          d.displayName ||
          d.fullName    ||
          d.userName    ||
          user.displayName ||
          "";

        // Always render name (even empty shows nothing, no broken layout)
        profileName.textContent = name;

        // Username
        if (d.username || d.userName) {
          const uname = d.username || d.userName;
          profileUsername.textContent =
            uname.startsWith("@") ? uname : "@" + uname;
        }

        // Bio
        if (d.bio) profileBio.textContent = d.bio;

        // Address
        const addr = d.address || d.location || "";
        if (addr) {
          addressText.textContent = addr;
          profileAddress.classList.remove("hidden");
        }
      });
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>

</body>
</html>

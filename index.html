<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary:       #8A4FF7;
      --primary-grad:  linear-gradient(135deg, #6C3EF4, #A65CF8);
      --primary-light: #f3eefe;
      --bg:            #ffffff;
      --surface:       #f9f9f9;
      --border:        #f0f0f0;
      --text:          #1a1a1a;
      --text-2:        #555;
      --text-muted:    #aaa;
      --topbar-h:      54px;
      --bottomnav-h:   62px;
      --max-w:         640px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hidden { display: none !important; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════
       TOP BAR
    ══════════════════════════════════════ */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: #fff;
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-inner {
      width: 100%;
      max-width: var(--max-w);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-logo {
      height: 28px;
      object-fit: contain;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: var(--text);
      position: relative;
      transition: background 0.15s;
    }

    .icon-btn:hover { background: var(--surface); }

    .notif-dot {
      position: absolute;
      top: 6px; right: 6px;
      width: 8px; height: 8px;
      background: #f04;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    /* ══════════════════════════════════════
       MAIN SCROLL AREA
    ══════════════════════════════════════ */
    .main {
      padding-top: var(--topbar-h);
      padding-bottom: var(--bottomnav-h);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .main-content {
      width: 100%;
      max-width: var(--max-w);
    }

    /* ══════════════════════════════════════
       STORIES
    ══════════════════════════════════════ */
    .stories-section {
      padding: 14px 0 12px;
      border-bottom: 1px solid var(--border);
    }

    .stories-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding: 0 16px;
      scrollbar-width: none;
    }
    .stories-scroll::-webkit-scrollbar { display: none; }

    .story-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .story-ring {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      padding: 2.5px;
      background: var(--primary-grad);
    }

    .story-ring-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2.5px solid #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
    }

    .story-ring-inner img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Add story item */
    .story-add .story-ring {
      background: var(--border);
      padding: 0;
    }

    .story-add .story-ring-inner {
      border: none;
      background: var(--surface);
      position: relative;
    }

    .story-add-icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--primary-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .story-name {
      font-size: 11px;
      color: var(--text-2);
      font-weight: 500;
      max-width: 60px;
      text-align: center;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* ══════════════════════════════════════
       FEED
    ══════════════════════════════════════ */
    #feedContainer {
      padding-top: 6px;
    }

    /* Loading posts spinner */
    .feed-loading {
      display: flex;
      justify-content: center;
      padding: 48px 0;
    }

    .feed-spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(138, 79, 247, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Empty state */
    .empty-feed {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 40px;
      gap: 10px;
      text-align: center;
    }

    .empty-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      margin-bottom: 6px;
    }

    .empty-feed h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .empty-feed p {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 220px;
      line-height: 1.6;
    }

    .empty-cta {
      margin-top: 8px;
      padding: 11px 26px;
      background: var(--primary-grad);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .empty-cta:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ══════════════════════════════════════
       POST CARD
    ══════════════════════════════════════ */
    .post-card {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
    }

    .post-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .post-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--surface);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      color: var(--primary);
    }

    .post-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .post-meta { display: flex; flex-direction: column; gap: 1px; }

    .post-username {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .post-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .post-more {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      border-radius: 50%;
      color: var(--text-2);
      transition: background 0.15s;
    }
    .post-more:hover { background: var(--surface); }

    .post-content {
      padding: 0 16px 12px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-media {
      width: 100%;
      background: #000;
      max-height: 480px;
      overflow: hidden;
    }

    .post-media img,
    .post-media video {
      width: 100%;
      height: auto;
      max-height: 480px;
      object-fit: cover;
      display: block;
    }

    .post-actions {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      gap: 4px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-2);
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }

    .action-btn:hover { background: var(--surface); }

    .action-btn.liked { color: #e63950; }
    .action-btn.liked svg { fill: #e63950; stroke: #e63950; }

    .action-count { font-size: 13px; }

    .action-btn.bookmark-btn { margin-left: auto; }

    /* ══════════════════════════════════════
       BOTTOM NAVIGATION
    ══════════════════════════════════════ */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--bottomnav-h);
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .bottom-nav-inner {
      width: 100%;
      max-width: var(--max-w);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 8px;
      height: 100%;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      flex: 1;
      height: 100%;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      font-weight: 500;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item:hover,
    .nav-item.active { color: var(--primary); }

    .nav-item.active svg { stroke: var(--primary); }

    /* Create post button (center) */
    .nav-create {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      cursor: pointer;
      background: none;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-create-circle {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--primary-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(138, 79, 247, 0.35);
    }

    .nav-create:hover .nav-create-circle {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(138, 79, 247, 0.4);
    }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (min-width: 640px) {
      .topbar-inner { padding: 0 24px; }
      .main-content { padding: 0; }
      .post-content { font-size: 15px; }
    }
  </style>
</head>
<body>

  <!-- ══ App Shell ══ -->
  <div id="app">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-inner">
        <img
          src="https://i.ibb.co.com/1fKZGC7X/file-0000000003c87208ad00b615126c723f-1-removebg-preview.png"
          alt="Insight"
          class="topbar-logo"
          draggable="false"
        />

        <div class="topbar-actions">
          <!-- Search -->
          <button class="icon-btn" id="searchBtn" aria-label="Search" onclick="window.location.href='/explore'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>

          <!-- Notifications -->
          <button class="icon-btn" id="notifBtn" aria-label="Notifications" onclick="window.location.href='/notifications'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notif-dot hidden" id="notifDot"></span>
          </button>

          <!-- Messages -->
          <button class="icon-btn" aria-label="Messages" onclick="window.location.href='/messages'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>


    <!-- Main scroll area -->
    <main class="main">
      <div class="main-content">

        <!-- Stories -->
        <div class="stories-section">
          <div class="stories-scroll" id="storiesRow">

            <!-- Add Story (always first) -->
            <div class="story-item story-add" id="addStoryBtn">
              <div class="story-ring">
                <div class="story-ring-inner">
                  <div class="story-add-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                  </div>
                </div>
              </div>
              <span class="story-name">Your Story</span>
            </div>

            <!-- Other stories injected here by JS -->

          </div>
        </div>


        <!-- Feed -->
        <div id="feedContainer">

          <!-- Loading -->
          <div class="feed-loading" id="feedLoading">
            <div class="feed-spinner"></div>
          </div>

          <!-- Empty state -->
          <div class="empty-feed hidden" id="emptyFeed">
            <div class="empty-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </div>
            <h3>No posts yet</h3>
            <p>Follow people or be the first to share something!</p>
            <button class="empty-cta" id="createFromEmpty">Create Post</button>
          </div>

          <!-- Post cards injected here by JS -->

        </div>

      </div>
    </main>


    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <div class="bottom-nav-inner">

        <!-- Home -->
        <a href="/" class="nav-item active" aria-label="Home">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Home</span>
        </a>

        <!-- Explore -->
        <a href="/explore" class="nav-item" aria-label="Explore">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span>Explore</span>
        </a>

        <!-- Create (center) -->
        <button class="nav-create" id="createPostBtn" aria-label="Create Post">
          <div class="nav-create-circle">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </div>
        </button>

        <!-- Notifications -->
        <a href="/notifications" class="nav-item" aria-label="Notifications">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span>Activity</span>
        </a>

        <!-- Profile -->
        <a href="/profile" class="nav-item" id="profileNavBtn" aria-label="Profile">
          <div id="navAvatar" style="
            width:26px; height:26px; border-radius:50%;
            background: var(--surface); overflow:hidden;
            display:flex; align-items:center; justify-content:center;
            border: 1.5px solid var(--border); flex-shrink:0;
          ">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span>Profile</span>
        </a>

      </div>
    </nav>

  </div><!-- #app -->


  <!-- ══ Firebase Logic ══ -->
  <script type="module">
    import { auth, db } from "./config.js";
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import {
      ref, query, orderByChild, limitToLast, onValue
    } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-database.js";

    const loadingScreen  = document.getElementById("loadingScreen");
    const app            = document.getElementById("app");
    const feedContainer  = document.getElementById("feedContainer");
    const feedLoading    = document.getElementById("feedLoading");
    const emptyFeed      = document.getElementById("emptyFeed");
    const navAvatar      = document.getElementById("navAvatar");
    const createPostBtn  = document.getElementById("createPostBtn");
    const createFromEmpty= document.getElementById("createFromEmpty");

    let currentUser = null;

    // ── SVG icon strings for post actions ───────────────────
    const HEART_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78
               l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>`;

    const COMMENT_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>`;

    const SHARE_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>`;

    const BOOKMARK_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>`;

    const MORE_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
    </svg>`;

    // ── Auth check ───────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "/login";
        return;
      }

      currentUser = user;

      // Profile avatar in bottom nav
      if (user.photoURL) {
        navAvatar.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;" alt="Profile">`;
      } else {
        const letter = (user.displayName || user.email || "?")[0].toUpperCase();
        navAvatar.innerHTML = `<span style="font-size:13px;font-weight:600;color:var(--primary)">${letter}</span>`;
      }

      loadFeed();
    });

    // ── Create post button ───────────────────────────────────
    createPostBtn.addEventListener("click",  () => window.location.href = "/create");
    createFromEmpty.addEventListener("click", () => window.location.href = "/create");

    // ── Load feed from Firebase ──────────────────────────────
    function loadFeed() {
      const postsQuery = query(
        ref(db, "posts"),
        orderByChild("timestamp"),
        limitToLast(30)
      );

      onValue(postsQuery, (snapshot) => {
        feedLoading.classList.add("hidden");

        // Remove old post cards
        document.querySelectorAll(".post-card").forEach(el => el.remove());

        if (!snapshot.exists()) {
          emptyFeed.classList.remove("hidden");
          return;
        }

        emptyFeed.classList.add("hidden");

        // Collect & reverse (newest first)
        const posts = [];
        snapshot.forEach((child) => {
          posts.unshift({ id: child.key, ...child.val() });
        });

        posts.forEach(post => {
          const card = buildPostCard(post);
          feedContainer.appendChild(card);
        });
      });
    }

    // ── Build post card element ──────────────────────────────
    function buildPostCard(post) {
      const card = document.createElement("article");
      card.className = "post-card";
      card.dataset.postId = post.id;

      const isLiked    = post.likes?.[currentUser?.uid] === true;
      const likeCount  = post.likesCount  || 0;
      const cmtCount   = post.commentsCount || 0;
      const avatarHtml = post.avatarUrl
        ? `<img src="${escHtml(post.avatarUrl)}" alt="${escHtml(post.username || '')}" style="width:100%;height:100%;object-fit:cover;">`
        : `<span style="font-size:16px;font-weight:600;color:var(--primary)">
             ${(post.username || "?")[0].toUpperCase()}
           </span>`;

      const mediaHtml = post.mediaUrl
        ? `<div class="post-media">
             ${post.mediaType === "video"
               ? `<video src="${escHtml(post.mediaUrl)}" controls playsinline></video>`
               : `<img src="${escHtml(post.mediaUrl)}" alt="Post" loading="lazy">`}
           </div>`
        : "";

      card.innerHTML = `
        <div class="post-header">
          <div class="post-user">
            <div class="post-avatar">${avatarHtml}</div>
            <div class="post-meta">
              <span class="post-username">${escHtml(post.username || "Unknown")}</span>
              <span class="post-time">${timeAgo(post.timestamp)}</span>
            </div>
          </div>
          <button class="post-more">${MORE_SVG}</button>
        </div>
        ${post.content ? `<p class="post-content">${escHtml(post.content)}</p>` : ""}
        ${mediaHtml}
        <div class="post-actions">
          <button class="action-btn like-btn ${isLiked ? "liked" : ""}" data-post-id="${post.id}">
            ${HEART_SVG} <span class="action-count">${likeCount}</span>
          </button>
          <button class="action-btn comment-btn" data-post-id="${post.id}">
            ${COMMENT_SVG} <span class="action-count">${cmtCount}</span>
          </button>
          <button class="action-btn share-btn">
            ${SHARE_SVG}
          </button>
          <button class="action-btn bookmark-btn">
            ${BOOKMARK_SVG}
          </button>
        </div>
      `;

      // Like toggle
      card.querySelector(".like-btn").addEventListener("click", () => toggleLike(post.id));

      // Comment → go to post detail
      card.querySelector(".comment-btn").addEventListener("click", () => {
        window.location.href = `/post?id=${post.id}`;
      });

      return card;
    }

    // ── Like toggle ──────────────────────────────────────────
    async function toggleLike(postId) {
      // Will be implemented with Firebase transactions
      // Placeholder for now
    }

    // ── Helpers ──────────────────────────────────────────────
    function timeAgo(ts) {
      if (!ts) return "";
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60)  return "Just now";
      if (s < 3600) return `${Math.floor(s / 60)}m`;
      if (s < 86400) return `${Math.floor(s / 3600)}h`;
      if (s < 604800) return `${Math.floor(s / 86400)}d`;
      return new Date(ts).toLocaleDateString();
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>

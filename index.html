<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .logo img {
      width: 150px;
      object-fit: contain;
      display: block;
    }

    /* Spinner */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3.5px solid rgba(138, 79, 247, 0.2);
      border-top-color: #8A4FF7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="logo">
    <img
      src="https://i.ibb.co.com/1fKZGC7X/file-0000000003c87208ad00b615126c723f-1-removebg-preview.png"
      alt="Insight"
      draggable="false"
    />
  </div>

  <div class="spinner"></div>

  <script type="module">
    import { auth } from "./config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (user) {
        // লগইন আছে → Feed/Home পেইজে যাও
        window.location.href = "/feed";
      } else {
        // লগইন নেই → Login পেইজে যাও
        window.location.href = "/login";
      }
    });
  </script>

</body>
</html>
